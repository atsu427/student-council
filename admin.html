<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | 灘校生徒会</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#1f2420;
      --ink-soft:#4b5048;
      --paper:#f5f2ea;
      --paper-deep:#ece6d8;
      --line:#cdc4ab;
      --vermillion:#a23b2e;
      --gold:#9c7a32;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
    h2,.login-card h2,.error-card h2{font-family:'Shippori Mincho',serif}
    header{background:var(--ink);color:var(--paper);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;border-bottom:3px solid var(--vermillion)}
    header h1{font-size:18px;font-weight:700;font-family:'Shippori Mincho',serif;letter-spacing:.04em}
    .header-right{display:flex;align-items:center;gap:16px}
    .user-name{font-size:12px;color:#cfc6ad}
    .btn{padding:8px 20px;border-radius:0;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;text-decoration:none;display:inline-block;font-family:inherit}
    .btn-primary{background:var(--vermillion);color:var(--paper)}
    .btn-primary:hover{background:#8a3024}
    .btn-outline{background:transparent;color:var(--paper);border:1px solid rgba(245,242,234,.45)}
    .btn-outline:hover{background:rgba(245,242,234,.1)}
    .btn-view{background:transparent;color:var(--paper);font-weight:500;border:1px solid var(--gold)}
    .btn-view:hover{background:var(--gold);color:var(--ink)}
    /* ログイン */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--ink)}
    .login-card{background:var(--paper);border-radius:0;padding:56px 44px;text-align:center;box-shadow:none;max-width:380px;width:100%;border-top:3px solid var(--vermillion)}
    .login-card h2{font-size:23px;margin-bottom:10px;letter-spacing:.05em}
    .login-card p{color:var(--ink-soft);font-size:13px;margin-bottom:36px;line-height:1.8}
    .btn-google{background:var(--paper);color:var(--ink);border:1px solid var(--ink);display:flex;align-items:center;gap:10px;font-size:14px;padding:13px 24px;border-radius:0;cursor:pointer;width:100%;justify-content:center;font-weight:500;transition:all .15s;font-family:inherit}
    .btn-google:hover{background:var(--ink);color:var(--paper)}
    .login-note{margin-top:18px;font-size:11px;color:#a89f87}
    #errorScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--ink)}
    .error-card{background:var(--paper);border-radius:0;padding:56px 44px;text-align:center;box-shadow:none;max-width:380px;width:100%;border-top:3px solid var(--vermillion)}
    .error-card h2{font-size:21px;margin-bottom:14px;color:var(--vermillion)}
    .error-card p{font-size:13px;color:var(--ink-soft);margin-bottom:28px;line-height:1.8}
    #adminScreen{display:none}
    /* タブ */
    .tabs{display:flex;gap:28px;border-bottom:1px solid var(--line);margin-bottom:36px}
    .tab{padding:12px 2px;font-size:14px;font-weight:500;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
    .tab.active{color:var(--vermillion);border-bottom-color:var(--vermillion);font-weight:700}
    .tab:hover{color:var(--ink)}
    .tab-content{display:none}
    .tab-content.active{display:block}
    /* コンテナ */
    .admin-container{max-width:900px;margin:0 auto;padding:40px 32px 96px}
    .section-title{font-size:17px;font-weight:700;margin-bottom:22px;padding-bottom:0;border-bottom:none;display:flex;align-items:center;justify-content:flex-start;font-family:'Shippori Mincho',serif;letter-spacing:.04em}
    .section-title::before{content:'';display:inline-block;width:14px;height:1px;background:var(--vermillion);margin-right:10px;vertical-align:middle}
    /* フォーム */
    .post-form{background:transparent;border-radius:0;padding:0 0 36px;box-shadow:none;margin-bottom:44px;border-bottom:1px solid var(--line)}
    .form-row{margin-bottom:22px}
    label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:7px;letter-spacing:.03em}
    input[type="text"],select,textarea{width:100%;padding:10px 4px;border:none;border-bottom:1px solid var(--line);border-radius:0;font-size:15px;font-family:inherit;outline:none;background:transparent;color:var(--ink);transition:border-color .2s}
    input[type="text"]:focus,select:focus,textarea:focus{border-color:var(--vermillion)}
    textarea{min-height:160px;resize:vertical;line-height:1.8;border:1px solid var(--line);padding:12px 14px}
    /* ロール選択チェックボックス */
    .role-checkboxes{display:flex;flex-wrap:wrap;gap:10px 16px;padding:14px 2px;background:transparent;border-radius:0;border:none;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .role-checkbox-item{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer}
    .role-checkbox-item input{cursor:pointer;width:15px;height:15px;accent-color:var(--vermillion)}
    /* ファイルアップロード */
    .file-drop-area{border:1px dashed var(--line);border-radius:0;padding:22px;text-align:center;cursor:pointer;transition:all .2s;background:var(--paper-deep)}
    .file-drop-area:hover,.file-drop-area.drag-over{border-color:var(--vermillion);background:#e7ddc7}
    .file-drop-area p{font-size:13px;color:var(--ink-soft);margin-bottom:4px}
    .file-drop-area span{font-size:11px;color:#a89f87}
    input[type="file"]{display:none}
    .file-preview-list{display:flex;flex-direction:column;gap:0;margin-top:10px}
    .file-preview-item{display:flex;align-items:center;gap:10px;padding:9px 4px;background:transparent;border-radius:0;border-bottom:1px solid var(--line);font-size:13px}
    .file-preview-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-remove{background:none;border:none;color:var(--vermillion);cursor:pointer;font-size:18px;padding:0 2px;flex-shrink:0}
    .existing-files{margin-bottom:10px}
    .existing-file-item{display:flex;align-items:center;gap:10px;padding:8px 4px;background:transparent;border-radius:0;font-size:13px;margin-bottom:0;border-bottom:1px solid var(--line)}
    .existing-file-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .upload-progress{font-size:13px;color:var(--gold);display:none;margin-top:8px}
    .form-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;align-items:center}
    .publish-toggle{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer}
    .publish-toggle input{width:auto;cursor:pointer;accent-color:var(--vermillion)}
    /* 投稿一覧 */
    .posts-list{display:block}
    .post-item{background:transparent;border-radius:0;padding:16px 4px;box-shadow:none;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
    .post-item-info{flex:1;min-width:0}
    .post-item-title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;font-family:'Shippori Mincho',serif}
    .post-item-meta{font-size:12px;color:#8c8470;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .post-item-actions{display:flex;gap:6px;flex-shrink:0}
    .btn-sm{padding:5px 14px;font-size:12px;border-radius:0;border:1px solid transparent;cursor:pointer;font-weight:500}
    .btn-edit{background:transparent;color:var(--gold);border-color:var(--gold)}
    .btn-edit:hover{background:var(--gold);color:var(--paper)}
    .btn-del{background:transparent;color:var(--vermillion);border-color:var(--vermillion)}
    .btn-del:hover{background:var(--vermillion);color:var(--paper)}
    .status-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:0}
    .status-published{background:transparent;color:#3d6b4a;border:1px solid #3d6b4a}
    .status-draft{background:transparent;color:#a89f87;border:1px solid var(--line)}
    .tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:0;background:none;color:var(--vermillion);border-bottom:1px solid currentColor}
    .role-tag-sm{font-size:11px;padding:2px 8px;border-radius:0;background:var(--paper-deep);color:var(--ink-soft);border:1px solid var(--line)}
    /* 生徒管理 */
    .members-table{width:100%;border-collapse:collapse;background:transparent;border-radius:0;overflow:visible;box-shadow:none}
    .members-table th{background:transparent;color:var(--ink);padding:10px 14px;text-align:left;font-size:12px;font-weight:700;border-bottom:1px solid var(--ink);letter-spacing:.03em}
    .members-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line)}
    .members-table tr:last-child td{border-bottom:1px solid var(--line)}
    .members-table tr:hover td{background:var(--paper-deep)}
    .role-select{padding:5px 10px;border:none;border-bottom:1px solid var(--line);border-radius:0;font-size:13px;background:transparent;cursor:pointer}
    /* ロール管理 */
    .roles-list{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
    .role-chip{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--line);border-radius:0;padding:6px 14px;font-size:13px;font-weight:500}
    .role-chip-del{background:none;border:none;color:var(--vermillion);cursor:pointer;font-size:16px;line-height:1}
    .add-role-row{display:flex;gap:8px;margin-top:4px}
    .add-role-row input{flex:1;max-width:200px;border:none;border-bottom:1px solid var(--line);padding:8px 4px}
    /* トースト */
    .toast{position:fixed;bottom:32px;right:24px;background:var(--ink);color:var(--paper);padding:12px 24px;border-radius:0;font-size:13px;opacity:0;transition:opacity .3s;z-index:1000;border-left:3px solid var(--vermillion)}
    .toast.show{opacity:1}
    .empty{color:#a89f87;text-align:center;padding:40px;font-size:13px}
    .loading{color:#a89f87;text-align:center;padding:40px;font-size:13px;font-family:'Shippori Mincho',serif}
  </style>
</head>
<body>

<!-- ログイン -->
<div id="loginScreen">
  <div class="login-card">
    <h2>管理者ログイン</h2>
    <p>灘校のGoogleアカウントでログインしてください</p>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
    <p class="login-note">※ 管理者（j170470@stg.nada.ac.jp）のみ</p>
  </div>
</div>

<!-- アクセス拒否 -->
<div id="errorScreen">
  <div class="error-card">
    <h2>アクセス権限がありません</h2>
    <p id="errorMsg"></p>
    <button class="btn btn-outline" style="color:#555;border-color:#ccc" onclick="logout()">ログアウト</button>
  </div>
</div>

<!-- 管理画面 -->
<div id="adminScreen">
  <header>
    <h1>灘校生徒会 管理画面</h1>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <a href="index.html" class="btn btn-view">お知らせを見る</a>
      <button class="btn btn-outline" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="admin-container">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('posts')">投稿管理</div>
      <div class="tab" onclick="switchTab('members')">生徒管理</div>
      <div class="tab" onclick="switchTab('roles')">ロール管理</div>
    </div>

    <!-- 投稿管理タブ -->
    <div class="tab-content active" id="tab-posts">
      <div class="section-title" id="formTitle">新規投稿</div>
      <div class="post-form">
        <input type="hidden" id="editId">
        <div class="form-row">
          <label>タイトル</label>
          <input type="text" id="inputTitle" placeholder="お知らせのタイトル">
        </div>
        <div class="form-row">
          <label>カテゴリ</label>
          <select id="inputCategory">
            <option value="お知らせ">お知らせ</option>
            <option value="行事">行事</option>
            <option value="部活">部活</option>
            <option value="募集">募集</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-row">
          <label>本文</label>
          <textarea id="inputBody" placeholder="内容を入力"></textarea>
        </div>
        <div class="form-row">
          <label>対象ロール（未選択＝全員に表示）</label>
          <div class="role-checkboxes" id="roleCheckboxes">
            <span style="font-size:13px;color:#aaa">読み込み中...</span>
          </div>
        </div>
        <div class="form-row">
          <label>添付ファイル</label>
          <div id="existingFilesArea" style="display:none" class="existing-files">
            <div style="font-size:12px;color:#666;margin-bottom:6px">現在の添付ファイル</div>
            <div id="existingFilesList"></div>
          </div>
          <div class="file-drop-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
            <p>クリックまたはドロップでファイル追加</p>
            <span>画像・PDF・Word・Excel・PowerPoint など（最大50MB）</span>
          </div>
          <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.txt,.csv">
          <div class="file-preview-list" id="filePreviewList"></div>
          <div class="upload-progress" id="uploadProgress">アップロード中...</div>
        </div>
        <div class="form-actions">
          <label class="publish-toggle">
            <input type="checkbox" id="inputPublished" checked> すぐに公開する
          </label>
          <div style="flex:1"></div>
          <button class="btn" style="background:transparent;color:#4b5048;border:1px solid #cdc4ab" onclick="resetForm()">キャンセル</button>
          <button class="btn btn-primary" onclick="savePost()">保存する</button>
        </div>
      </div>

      <div class="section-title">投稿一覧</div>
      <div class="posts-list" id="postsList"><div class="loading">読み込み中...</div></div>
    </div>

    <!-- 生徒管理タブ -->
    <div class="tab-content" id="tab-members">
      <div class="section-title">ログイン済み生徒一覧</div>
      <div id="membersArea"><div class="loading">読み込み中...</div></div>
    </div>

    <!-- ロール管理タブ -->
    <div class="tab-content" id="tab-roles">
      <div class="section-title">ロール一覧</div>
      <div id="rolesArea"><div class="loading">読み込み中...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://uvqidlzkiuyvqxqttuae.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWlkbHpraXV5dnF4cXR0dWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzk0MTEsImV4cCI6MjA5ODA1NTQxMX0.VrpNjeEpsfOGJKsSz8uSGxrqiuChT9QjEzgjUnAv1s8';
  const ADMIN_EMAIL = 'j170470@stg.nada.ac.jp';
  // ※テスト中はドメイン制限なし。本番に戻す場合は null → 'stg.nada.ac.jp' に変更（index.html/post.htmlと必ず揃えること）
  const ALLOWED_DOMAIN = null;
  const STORAGE_BUCKET = 'post-files';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, storageKey: 'seitokai-session' }
  });

  let currentUser = null;
  let selectedFiles = [];
  let existingFilePaths = [];
  let removedFilePaths = [];
  let allRoles = [];

  // ── 認証 ──
  db.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      // 大文字小文字・前後の空白の違いで誤って弾かれないように正規化して比較
      const email = (session.user.email || '').trim();
      const emailLower = email.toLowerCase();
      if (ALLOWED_DOMAIN && emailLower.split('@')[1] !== ALLOWED_DOMAIN.toLowerCase()) {
        await db.auth.signOut();
        showError(`@${ALLOWED_DOMAIN} のアカウントでログインしてください。`);
        return;
      }
      if (emailLower !== ADMIN_EMAIL.toLowerCase()) {
        console.error('管理者メール不一致:', JSON.stringify(email), '!=', JSON.stringify(ADMIN_EMAIL));
        await db.auth.signOut();
        showError(`管理者（${ADMIN_EMAIL}）のみアクセスできます。`);
        return;
      }
      currentUser = session.user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      document.getElementById('userName').textContent = email;
      await loadRoles();
      loadPosts();

      // 管理者自身もmembersに登録（生徒一覧に表示されるように）
      const { error: selfUpsertError } = await db.from('members')
        .upsert({ id: currentUser.id, email, role: 'admin' }, { onConflict: 'id' });
      if (selfUpsertError) console.error('管理者のmembers登録エラー:', selfUpsertError.message);
    } else {
      currentUser = null;
      if (document.getElementById('errorScreen').style.display !== 'flex') {
        document.getElementById('loginScreen').style.display = 'flex';
      }
      document.getElementById('adminScreen').style.display = 'none';
    }
  });

  function showError(msg) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display = 'flex';
    document.getElementById('errorMsg').textContent = msg;
  }

  async function loginWithGoogle() {
    const opts = { redirectTo: location.href };
    if (ALLOWED_DOMAIN) opts.queryParams = { hd: ALLOWED_DOMAIN };
    await db.auth.signInWithOAuth({ provider: 'google', options: opts });
  }

  async function logout() {
    await db.auth.signOut();
    document.getElementById('errorScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  // ── タブ切り替え ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['posts','members','roles'][i] === name));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'members') loadMembers();
    if (name === 'roles') renderRolesTab();
  }

  // ── ロール ──
  async function loadRoles() {
    const { data } = await db.from('roles').select('*').order('id');
    allRoles = (data || []).map(r => r.name);
    renderRoleCheckboxes([]);
  }

  function renderRoleCheckboxes(selectedRoles) {
    const el = document.getElementById('roleCheckboxes');
    if (allRoles.length === 0) { el.innerHTML = '<span style="font-size:13px;color:#aaa">ロールがありません（ロール管理から追加）</span>'; return; }
    el.innerHTML = allRoles.map(r => `
      <label class="role-checkbox-item">
        <input type="checkbox" name="targetRole" value="${escapeHtml(r)}" ${selectedRoles.includes(r) ? 'checked' : ''}>
        ${escapeHtml(r)}
      </label>`).join('');
  }

  function getSelectedRoles() {
    return Array.from(document.querySelectorAll('input[name="targetRole"]:checked')).map(el => el.value);
  }

  async function renderRolesTab() {
    const el = document.getElementById('rolesArea');
    el.innerHTML = `
      <div class="roles-list" id="rolesList">${allRoles.map(r => `
        <div class="role-chip">
          ${escapeHtml(r)}
          <button class="role-chip-del" onclick="deleteRole('${escapeHtml(r)}')" title="削除">×</button>
        </div>`).join('')}
      </div>
      <div class="add-role-row">
        <input type="text" id="newRoleName" placeholder="新しいロール名" style="max-width:220px">
        <button class="btn btn-primary" onclick="addRole()">追加</button>
      </div>`;
  }

  async function addRole() {
    const name = document.getElementById('newRoleName').value.trim();
    if (!name) return;
    const { error } = await db.from('roles').insert({ name });
    if (error) { showToast('追加失敗: ' + error.message); return; }
    await loadRoles();
    renderRolesTab();
    showToast('ロールを追加しました');
  }

  async function deleteRole(name) {
    if (!confirm(`ロール「${name}」を削除しますか？`)) return;
    const { error } = await db.from('roles').delete().eq('name', name);
    if (error) { showToast('削除失敗'); return; }
    await loadRoles();
    renderRolesTab();
    showToast('削除しました');
  }

  // ── 生徒管理 ──
  async function loadMembers() {
    const el = document.getElementById('membersArea');
    el.innerHTML = '<div class="loading">読み込み中...</div>';
    const { data, error } = await db.from('members').select('*').order('created_at', { ascending: false });
    if (error) { el.innerHTML = '<div class="empty">読み込みエラー: ' + error.message + '</div>'; return; }
    if (!data || data.length === 0) { el.innerHTML = '<div class="empty">まだログインした生徒はいません</div>'; return; }

    const roleChoices = ['general', ...allRoles];
    let rows = '';
    for (const m of data) {
      const opts = roleChoices.map(r => `<option value="${escapeHtml(r)}"${m.role === r ? ' selected' : ''}>${escapeHtml(r)}</option>`).join('');
      rows += `<tr><td>${escapeHtml(m.email)}</td><td><select class="role-select" onchange="updateMemberRole('${m.id}', this.value)">${opts}</select></td><td>${new Date(m.created_at).toLocaleDateString('ja-JP')}</td></tr>`;
    }
    el.innerHTML = '<table class="members-table"><thead><tr><th>メールアドレス</th><th>ロール</th><th>初回ログイン</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  async function updateMemberRole(id, role) {
    const { error } = await db.from('members').update({ role }).eq('id', id);
    if (error) { showToast('更新失敗: ' + error.message); return; }
    showToast('ロールを更新しました');
  }

  // ── ファイル操作 ──
  const dropArea = document.getElementById('dropArea');
  const fileInput = document.getElementById('fileInput');

  fileInput.addEventListener('change', () => { addFiles(Array.from(fileInput.files)); fileInput.value = ''; });
  dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
  dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
  dropArea.addEventListener('drop', e => { e.preventDefault(); dropArea.classList.remove('drag-over'); addFiles(Array.from(e.dataTransfer.files)); });

  function addFiles(files) {
    files.forEach(f => { if (!selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) selectedFiles.push(f); });
    renderFilePreview();
  }

  function renderFilePreview() {
    const list = document.getElementById('filePreviewList');
    list.innerHTML = selectedFiles.map((f, i) => `
      <div class="file-preview-item">
        <span>${escapeHtml(f.name)}</span>
        <button class="file-remove" onclick="removeFile(${i})">×</button>
      </div>`).join('');
  }

  function removeFile(i) { selectedFiles.splice(i, 1); renderFilePreview(); }

  function renderExistingFiles(paths) {
    const area = document.getElementById('existingFilesArea');
    const list = document.getElementById('existingFilesList');
    if (!paths || paths.length === 0) { area.style.display = 'none'; return; }
    area.style.display = 'block';
    list.innerHTML = paths.map(path => {
      const name = path.split('/').pop();
      const removed = removedFilePaths.includes(path);
      return `<div class="existing-file-item">
        <span style="${removed ? 'text-decoration:line-through;color:#aaa' : ''}">${escapeHtml(name)}</span>
        ${removed
          ? `<button class="btn-sm btn-edit" onclick="restoreFile('${path}')">元に戻す</button>`
          : `<button class="btn-sm btn-del" onclick="markRemoveFile('${path}')">削除</button>`}
      </div>`;
    }).join('');
  }

  function markRemoveFile(path) { if (!removedFilePaths.includes(path)) removedFilePaths.push(path); renderExistingFiles(existingFilePaths); }
  function restoreFile(path) { removedFilePaths = removedFilePaths.filter(p => p !== path); renderExistingFiles(existingFilePaths); }

  async function uploadFiles(postId) {
    const results = await Promise.all(selectedFiles.map(file => {
      const ext = file.name.split('.').pop();
      const safe = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const path = `${postId}/${safe}`;
      return db.storage.from(STORAGE_BUCKET).upload(path, file)
        .then(({ error }) => ({ path, name: file.name, error }));
    }));
    const uploaded = results.filter(r => !r.error).map(r => r.path);
    const failed = results.filter(r => r.error);
    failed.forEach(r => console.error('ファイルアップロード失敗:', r.name, r.error.message));
    return { uploaded, failed };
  }

  // ── 投稿一覧 ──
  async function loadPosts() {
    const { data, error } = await db.from('posts').select('*').order('created_at', { ascending: false });
    const list = document.getElementById('postsList');
    if (error || !data || data.length === 0) { list.innerHTML = '<div class="empty">投稿はまだありません</div>'; return; }
    list.innerHTML = data.map(post => {
      const date = new Date(post.created_at).toLocaleDateString('ja-JP');
      const rolesHtml = (post.target_roles && post.target_roles.length > 0)
        ? post.target_roles.map(r => `<span class="role-tag-sm">${escapeHtml(r)}</span>`).join('') : '<span style="font-size:11px;color:#aaa">全員</span>';
      const filesNote = (post.file_paths && post.file_paths.length > 0) ? `📎${post.file_paths.length}` : '';
      return `<div class="post-item">
        <div class="post-item-info">
          <div class="post-item-title">${escapeHtml(post.title)}</div>
          <div class="post-item-meta">
            <span class="tag">${post.category}</span>
            <span class="status-badge ${post.published ? 'status-published' : 'status-draft'}">${post.published ? '公開中' : '下書き'}</span>
            ${rolesHtml}
            <span>${date}</span>
            ${filesNote ? `<span>${filesNote}</span>` : ''}
          </div>
        </div>
        <div class="post-item-actions">
          <button class="btn-sm btn-edit" onclick="editPost(${post.id})">編集</button>
          <button class="btn-sm btn-del" onclick="deletePost(${post.id})">削除</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── 保存 ──
  async function savePost() {
    const id = document.getElementById('editId').value;
    const title = document.getElementById('inputTitle').value.trim();
    const category = document.getElementById('inputCategory').value;
    const body = document.getElementById('inputBody').value.trim();
    const published = document.getElementById('inputPublished').checked;
    const target_roles = getSelectedRoles();

    if (!title || !body) { showToast('タイトルと本文を入力してください'); return; }

    if (selectedFiles.length > 0) document.getElementById('uploadProgress').style.display = 'block';

    let filePaths = id ? existingFilePaths.filter(p => !removedFilePaths.includes(p)) : [];
    if (id) for (const path of removedFilePaths) await db.storage.from(STORAGE_BUCKET).remove([path]);

    const tmpId = id || `tmp_${Date.now()}`;
    const { uploaded: newPaths, failed: failedUploads } = await uploadFiles(tmpId);
    filePaths = [...filePaths, ...newPaths];
    document.getElementById('uploadProgress').style.display = 'none';

    const payload = { title, category, body, published, target_roles, file_paths: filePaths, author: currentUser.email };

    const { error } = id
      ? await db.from('posts').update(payload).eq('id', id)
      : await db.from('posts').insert(payload);

    if (error) { showToast('保存失敗: ' + error.message); return; }
    if (failedUploads.length > 0) {
      showToast(`保存しましたが、${failedUploads.length}件のファイルがアップロードできませんでした（${failedUploads[0].error.message}）`);
    } else {
      showToast(id ? '更新しました！' : '投稿しました！');
    }
    resetForm();
    loadPosts();
  }

  // ── 編集 ──
  async function editPost(id) {
    const { data } = await db.from('posts').select('*').eq('id', id).single();
    if (!data) return;
    document.getElementById('editId').value = id;
    document.getElementById('inputTitle').value = data.title;
    document.getElementById('inputCategory').value = data.category;
    document.getElementById('inputBody').value = data.body;
    document.getElementById('inputPublished').checked = data.published;
    document.getElementById('formTitle').textContent = '投稿を編集';
    renderRoleCheckboxes(data.target_roles || []);
    existingFilePaths = data.file_paths || [];
    removedFilePaths = [];
    selectedFiles = [];
    renderFilePreview();
    renderExistingFiles(existingFilePaths);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── 削除 ──
  async function deletePost(id) {
    if (!confirm('この投稿を削除しますか？添付ファイルも削除されます。')) return;
    const { data } = await db.from('posts').select('file_paths').eq('id', id).single();
    if (data?.file_paths?.length > 0) await db.storage.from(STORAGE_BUCKET).remove(data.file_paths);
    const { error } = await db.from('posts').delete().eq('id', id);
    if (error) { showToast('削除失敗'); return; }
    showToast('削除しました');
    loadPosts();
  }

  function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputCategory').value = 'お知らせ';
    document.getElementById('inputBody').value = '';
    document.getElementById('inputPublished').checked = true;
    document.getElementById('formTitle').textContent = '新規投稿';
    renderRoleCheckboxes([]);
    selectedFiles = []; existingFilePaths = []; removedFilePaths = [];
    renderFilePreview();
    document.getElementById('existingFilesArea').style.display = 'none';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
