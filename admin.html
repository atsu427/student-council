<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | 灘校生徒会</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f7f8fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    header h1 { font-size: 18px; font-weight: 700; }

    .header-right { display: flex; align-items: center; gap: 16px; }
    .user-name { font-size: 13px; color: #a0c4ff; }

    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-danger { background: #d32f2f; color: #fff; }
    .btn-danger:hover { background: #b71c1c; }
    .btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.4); }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }
    .btn-google {
      background: #fff;
      color: #444;
      border: 1.5px solid #ddd;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      padding: 12px 24px;
    }
    .btn-google:hover { background: #f5f5f5; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    /* ログイン画面 */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }

    .login-card h2 { font-size: 24px; margin-bottom: 8px; }
    .login-card p { color: #666; font-size: 14px; margin-bottom: 32px; line-height: 1.7; }

    .login-note {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }

    /* エラー画面 */
    #errorScreen {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 24px;
    }

    .error-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }

    .error-card h2 { font-size: 22px; margin-bottom: 12px; color: #d32f2f; }
    .error-card p { font-size: 14px; color: #555; margin-bottom: 24px; line-height: 1.7; }

    /* 管理画面 */
    #adminScreen { display: none; }

    .admin-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #1a1a2e;
    }

    .post-form {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 40px;
    }

    .form-row { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
      background: #fff;
      color: #1a1a2e;
    }

    input[type="text"]:focus, select:focus, textarea:focus { border-color: #1a73e8; }

    textarea { min-height: 180px; resize: vertical; line-height: 1.7; }

    /* ファイルアップロード */
    .file-drop-area {
      border: 2px dashed #d0d5dd;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fafbfc;
    }

    .file-drop-area:hover, .file-drop-area.drag-over {
      border-color: #1a73e8;
      background: #e8f0fe;
    }

    .file-drop-area p { font-size: 14px; color: #666; margin-bottom: 8px; }
    .file-drop-area span { font-size: 12px; color: #aaa; }

    input[type="file"] { display: none; }

    .file-preview-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
    }

    .file-preview-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #f0f4ff;
      border-radius: 8px;
      font-size: 13px;
    }

    .file-preview-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .file-remove {
      background: none;
      border: none;
      color: #d32f2f;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .upload-progress {
      margin-top: 8px;
      font-size: 13px;
      color: #1a73e8;
      display: none;
    }

    /* 既存添付ファイル */
    .existing-files { margin-top: 12px; }
    .existing-file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      background: #f7f8fa;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 6px;
      border: 1px solid #e5e7eb;
    }

    .existing-file-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .publish-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }

    .publish-toggle input { width: auto; cursor: pointer; }

    /* 投稿一覧 */
    .posts-list { display: grid; gap: 12px; }

    .post-item {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .post-item-info { flex: 1; min-width: 0; }

    .post-item-title {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .post-item-meta { font-size: 12px; color: #888; margin-top: 4px; }

    .post-item-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-sm {
      padding: 5px 14px;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-edit { background: #e8f0fe; color: #1a73e8; }
    .btn-edit:hover { background: #d2e3fc; }
    .btn-del { background: #fce8e8; color: #d32f2f; }
    .btn-del:hover { background: #f5c6c6; }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .status-published { background: #e8f5e9; color: #2e7d32; }
    .status-draft { background: #f5f5f5; color: #999; }

    .category-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      background: #e8f0fe;
      color: #1a73e8;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      right: 24px;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    .toast.show { opacity: 1; }

    .empty { color: #aaa; text-align: center; padding: 40px; font-size: 14px; }
  </style>
</head>
<body>

<header>
  <h1>灘校生徒会 管理画面</h1>
  <div class="header-right">
    <span class="user-name" id="userName"></span>
    <button class="btn btn-outline" onclick="logout()">ログアウト</button>
  </div>
</header>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-card">
    <h2>管理者ログイン</h2>
    <p>灘校のGoogleアカウント（@stg.nada.ac.jp）でログインしてください</p>
    <button class="btn btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
    <p class="login-note">※ 管理者権限はj170470@stg.nada.ac.jpのみ</p>
  </div>
</div>

<!-- アクセス拒否画面 -->
<div id="errorScreen" style="display:none; align-items:center; justify-content:center; min-height:calc(100vh - 60px); padding:24px;">
  <div class="error-card">
    <h2>アクセス権限がありません</h2>
    <p id="errorMsg">このページにアクセスするには管理者権限が必要です。</p>
    <button class="btn btn-outline" style="color:#555;border-color:#ccc;" onclick="logout()">ログアウトして戻る</button>
  </div>
</div>

<!-- 管理画面 -->
<div id="adminScreen">
  <div class="admin-container">

    <div class="section-title" id="formTitle">新規投稿</div>
    <div class="post-form">
      <input type="hidden" id="editId">
      <div class="form-row">
        <label>タイトル</label>
        <input type="text" id="inputTitle" placeholder="お知らせのタイトルを入力">
      </div>
      <div class="form-row">
        <label>カテゴリ</label>
        <select id="inputCategory">
          <option value="お知らせ">お知らせ</option>
          <option value="行事">行事</option>
          <option value="部活">部活</option>
          <option value="募集">募集</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-row">
        <label>本文</label>
        <textarea id="inputBody" placeholder="内容を入力してください"></textarea>
      </div>

      <!-- ファイル添付 -->
      <div class="form-row">
        <label>添付ファイル（画像・PDF・Officeファイルなど）</label>

        <!-- 編集時の既存ファイル -->
        <div id="existingFilesArea" style="display:none; margin-bottom:12px;">
          <div style="font-size:12px; color:#666; margin-bottom:6px;">現在の添付ファイル</div>
          <div id="existingFilesList"></div>
        </div>

        <div class="file-drop-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
          <p>クリックまたはファイルをドロップ</p>
          <span>画像・PDF・Word・Excel・PowerPoint など（1ファイル最大50MB）</span>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.txt,.csv">
        <div class="file-preview-list" id="filePreviewList"></div>
        <div class="upload-progress" id="uploadProgress">アップロード中...</div>
      </div>

      <div class="form-actions">
        <label class="publish-toggle">
          <input type="checkbox" id="inputPublished" checked>
          すぐに公開する
        </label>
        <div style="flex:1"></div>
        <button class="btn btn-outline" style="color:#555;border-color:#ccc;" onclick="resetForm()">キャンセル</button>
        <button class="btn btn-primary" onclick="savePost()">保存する</button>
      </div>
    </div>

    <div class="section-title">投稿一覧</div>
    <div class="posts-list" id="postsList">
      <div class="empty">読み込み中...</div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://uvqidlzkiuyvqxqttuae.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWlkbHpraXV5dnF4cXR0dWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzk0MTEsImV4cCI6MjA5ODA1NTQxMX0.VrpNjeEpsfOGJKsSz8uSGxrqiuChT9QjEzgjUnAv1s8';

  const ADMIN_EMAIL = 'j170470@stg.nada.ac.jp';
  const ALLOWED_DOMAIN = 'stg.nada.ac.jp';
  const STORAGE_BUCKET = 'post-files';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let selectedFiles = [];        // 新規追加ファイル
  let existingFilePaths = [];    // 編集時の既存ファイルパス（削除対象管理）
  let removedFilePaths = [];     // 削除するファイルパス

  // ── 認証状態監視 ──
  db.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      const email = session.user.email;
      const domain = email.split('@')[1];

      // ドメインチェック
      if (domain !== ALLOWED_DOMAIN) {
        await db.auth.signOut();
        showError(`@${ALLOWED_DOMAIN} のアカウントでログインしてください。<br>（現在：${email}）`);
        return;
      }

      // 管理者チェック
      if (email !== ADMIN_EMAIL) {
        await db.auth.signOut();
        showError(`管理者（${ADMIN_EMAIL}）のみログインできます。<br>（現在：${email}）`);
        return;
      }

      currentUser = session.user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      document.getElementById('userName').textContent = email;
      loadPosts();
    } else {
      currentUser = null;
      if (document.getElementById('errorScreen').style.display !== 'flex') {
        document.getElementById('loginScreen').style.display = 'flex';
      }
      document.getElementById('adminScreen').style.display = 'none';
    }
  });

  function showError(msg) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'none';
    const es = document.getElementById('errorScreen');
    es.style.display = 'flex';
    document.getElementById('errorMsg').innerHTML = msg;
  }

  async function loginWithGoogle() {
    await db.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: location.href,
        queryParams: { hd: ALLOWED_DOMAIN }   // Googleのドメインヒント
      }
    });
  }

  async function logout() {
    await db.auth.signOut();
    document.getElementById('errorScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  // ── ファイル選択 ──
  const dropArea = document.getElementById('dropArea');
  const fileInput = document.getElementById('fileInput');

  fileInput.addEventListener('change', () => {
    addFiles(Array.from(fileInput.files));
    fileInput.value = '';
  });

  dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
  dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
  dropArea.addEventListener('drop', e => {
    e.preventDefault();
    dropArea.classList.remove('drag-over');
    addFiles(Array.from(e.dataTransfer.files));
  });

  function addFiles(files) {
    files.forEach(f => {
      if (!selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) {
        selectedFiles.push(f);
      }
    });
    renderFilePreview();
  }

  function renderFilePreview() {
    const list = document.getElementById('filePreviewList');
    if (selectedFiles.length === 0) { list.innerHTML = ''; return; }
    list.innerHTML = selectedFiles.map((f, i) => `
      <div class="file-preview-item">
        <span>${escapeHtml(f.name)}</span>
        <button class="file-remove" onclick="removeFile(${i})">×</button>
      </div>
    `).join('');
  }

  function removeFile(i) {
    selectedFiles.splice(i, 1);
    renderFilePreview();
  }

  function renderExistingFiles(paths) {
    const area = document.getElementById('existingFilesArea');
    const list = document.getElementById('existingFilesList');
    if (!paths || paths.length === 0) { area.style.display = 'none'; return; }
    area.style.display = 'block';
    list.innerHTML = paths.map(path => {
      const name = path.split('/').pop();
      const isRemoved = removedFilePaths.includes(path);
      return `
        <div class="existing-file-item" id="ef_${btoa(path).replace(/=/g,'')}">
          <span style="${isRemoved ? 'text-decoration:line-through;color:#aaa;' : ''}">${escapeHtml(name)}</span>
          ${isRemoved
            ? `<button class="btn-sm btn-edit" onclick="restoreFile('${path}')">戻す</button>`
            : `<button class="btn-sm btn-del" onclick="markRemoveFile('${path}')">削除</button>`}
        </div>
      `;
    }).join('');
  }

  function markRemoveFile(path) {
    if (!removedFilePaths.includes(path)) removedFilePaths.push(path);
    renderExistingFiles(existingFilePaths);
  }

  function restoreFile(path) {
    removedFilePaths = removedFilePaths.filter(p => p !== path);
    renderExistingFiles(existingFilePaths);
  }

  // ── ファイルアップロード ──
  async function uploadFiles(postId) {
    const uploaded = [];
    for (const file of selectedFiles) {
      const ext = file.name.split('.').pop();
      const safeName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const path = `${postId}/${safeName}`;
      const { error } = await db.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: false });
      if (error) { console.error('Upload error:', error); continue; }
      uploaded.push(path);
    }
    return uploaded;
  }

  // ── 投稿一覧 ──
  async function loadPosts() {
    const { data, error } = await db.from('posts').select('*').order('created_at', { ascending: false });
    const list = document.getElementById('postsList');
    if (error || !data || data.length === 0) {
      list.innerHTML = '<div class="empty">投稿はまだありません</div>';
      return;
    }
    list.innerHTML = data.map(post => {
      const date = new Date(post.created_at).toLocaleDateString('ja-JP');
      const filesNote = (post.file_paths && post.file_paths.length > 0)
        ? ` 　📎 ${post.file_paths.length}件` : '';
      return `
        <div class="post-item">
          <div class="post-item-info">
            <div class="post-item-title">${escapeHtml(post.title)}</div>
            <div class="post-item-meta">
              <span class="category-tag">${post.category}</span>
              <span class="status-badge ${post.published ? 'status-published' : 'status-draft'}">
                ${post.published ? '公開中' : '下書き'}
              </span>
              　${date}　${escapeHtml(post.author)}${filesNote}
            </div>
          </div>
          <div class="post-item-actions">
            <button class="btn-sm btn-edit" onclick="editPost(${post.id})">編集</button>
            <button class="btn-sm btn-del" onclick="deletePost(${post.id})">削除</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── 保存 ──
  async function savePost() {
    const id = document.getElementById('editId').value;
    const title = document.getElementById('inputTitle').value.trim();
    const category = document.getElementById('inputCategory').value;
    const body = document.getElementById('inputBody').value.trim();
    const published = document.getElementById('inputPublished').checked;

    if (!title || !body) { showToast('タイトルと本文を入力してください'); return; }

    document.getElementById('uploadProgress').style.display = selectedFiles.length > 0 ? 'block' : 'none';

    let filePaths = [];

    if (id) {
      // 編集：既存ファイルから削除対象を除外
      filePaths = existingFilePaths.filter(p => !removedFilePaths.includes(p));
      // 削除対象をStorageから削除
      for (const path of removedFilePaths) {
        await db.storage.from(STORAGE_BUCKET).remove([path]);
      }
    }

    // 新規ファイルをアップロード
    const postId = id || `tmp_${Date.now()}`;
    const newPaths = await uploadFiles(id || postId);
    filePaths = [...filePaths, ...newPaths];

    document.getElementById('uploadProgress').style.display = 'none';

    const payload = {
      title, category, body, published,
      author: currentUser?.email || '生徒会',
      file_paths: filePaths
    };

    let error, data;
    if (id) {
      ({ error } = await db.from('posts').update(payload).eq('id', id));
    } else {
      ({ error, data } = await db.from('posts').insert(payload).select().single());
      // tmpフォルダをIDフォルダに移動（Supabaseは直接移動不可のため、パスをそのまま記録）
    }

    if (error) { showToast('保存に失敗しました: ' + error.message); return; }

    showToast(id ? '更新しました！' : '投稿しました！');
    resetForm();
    loadPosts();
  }

  // ── 編集 ──
  async function editPost(id) {
    const { data } = await db.from('posts').select('*').eq('id', id).single();
    if (!data) return;

    document.getElementById('editId').value = id;
    document.getElementById('inputTitle').value = data.title;
    document.getElementById('inputCategory').value = data.category;
    document.getElementById('inputBody').value = data.body;
    document.getElementById('inputPublished').checked = data.published;
    document.getElementById('formTitle').textContent = '投稿を編集';

    // 既存ファイルの表示
    existingFilePaths = data.file_paths || [];
    removedFilePaths = [];
    selectedFiles = [];
    renderFilePreview();
    renderExistingFiles(existingFilePaths);

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── 削除 ──
  async function deletePost(id) {
    if (!confirm('この投稿を削除しますか？添付ファイルも全て削除されます。')) return;

    // Storageのファイルも削除
    const { data } = await db.from('posts').select('file_paths').eq('id', id).single();
    if (data?.file_paths?.length > 0) {
      await db.storage.from(STORAGE_BUCKET).remove(data.file_paths);
    }

    const { error } = await db.from('posts').delete().eq('id', id);
    if (error) { showToast('削除に失敗しました'); return; }
    showToast('削除しました');
    loadPosts();
  }

  function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputCategory').value = 'お知らせ';
    document.getElementById('inputBody').value = '';
    document.getElementById('inputPublished').checked = true;
    document.getElementById('formTitle').textContent = '新規投稿';
    selectedFiles = [];
    existingFilePaths = [];
    removedFilePaths = [];
    renderFilePreview();
    document.getElementById('existingFilesArea').style.display = 'none';
    document.getElementById('existingFilesList').innerHTML = '';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
