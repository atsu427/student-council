<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灘校生徒会 お知らせ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#1f2420;
      --ink-soft:#4b5048;
      --paper:#f5f2ea;
      --paper-deep:#ece6d8;
      --line:#cdc4ab;
      --vermillion:#a23b2e;
      --gold:#9c7a32;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
    h1,h2,.login-card h2,.error-card h2{font-family:'Shippori Mincho',serif}
    header{background:var(--ink);color:var(--paper);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--vermillion)}
    header h1{font-size:19px;font-weight:700;letter-spacing:.08em}
    .header-right{display:flex;align-items:center;gap:18px}
    .user-name{font-size:12px;color:#cfc6ad;letter-spacing:.02em}
    .btn{padding:7px 20px;border-radius:0;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;text-decoration:none;display:inline-block;font-family:inherit}
    .btn-outline{background:transparent;color:var(--paper);border:1px solid rgba(245,242,234,.45)}
    .btn-outline:hover{background:rgba(245,242,234,.1)}
    .btn-admin{background:transparent;color:var(--paper);border:none;font-size:12px;padding:0;font-weight:500;text-decoration:underline;text-decoration-color:rgba(245,242,234,.4);text-underline-offset:3px}
    .btn-admin:hover{text-decoration-color:var(--paper)}
    .hero{background:var(--ink);color:var(--paper);padding:0 32px 40px;text-align:left;border-bottom:1px solid rgba(245,242,234,.15)}
    .hero-inner{max-width:760px;margin:0 auto;padding-top:36px;border-top:1px solid rgba(245,242,234,.25)}
    .hero h2{font-size:clamp(26px,4vw,34px);font-weight:700;letter-spacing:.06em;margin-bottom:10px}
    .hero p{font-size:13px;color:#b9b09a;letter-spacing:.03em}
    .filter-bar{display:flex;gap:0;flex-wrap:wrap;max-width:760px;margin:0 auto;padding:0 32px;border-bottom:1px solid var(--line)}
    .filter-btn{padding:14px 18px 12px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--ink-soft);font-size:13px;cursor:pointer;transition:color .15s,border-color .15s;font-family:inherit;letter-spacing:.02em}
    .filter-btn.active{color:var(--vermillion);border-bottom-color:var(--vermillion);font-weight:700}
    .filter-btn:hover{color:var(--ink)}
    .posts-grid{max-width:760px;margin:0 auto;padding:8px 32px 80px;display:block}
    .post-card{background:transparent;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:26px 4px 24px;box-shadow:none;cursor:pointer;transition:padding-left .15s,border-color .15s;text-decoration:none;color:inherit;display:block}
    .post-card:hover{padding-left:14px;border-color:var(--ink)}
    .post-meta{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
    .category-tag{font-size:11px;font-weight:700;padding:2px 0;border-radius:0;background:none;color:var(--vermillion);letter-spacing:.08em;border-bottom:1px solid currentColor}
    .category-tag.行事{color:#6b5a1f}
    .category-tag.部活{color:#3d6b4a}
    .category-tag.募集{color:#a25f1f}
    .category-tag.その他{color:#5a4a6b}
    .role-tag{font-size:11px;padding:2px 9px;border-radius:2px;background:var(--paper-deep);color:var(--ink-soft);border:1px solid var(--line)}
    .post-date{font-size:12px;color:#8c8470;font-family:'Shippori Mincho',serif}
    .post-title{font-size:18px;font-weight:700;line-height:1.6;margin-bottom:10px;font-family:'Shippori Mincho',serif}
    .post-excerpt{font-size:14px;color:var(--ink-soft);line-height:1.85;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .post-has-files{font-size:12px;color:#8c8470;margin-top:10px}
    /* ログイン画面 */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--ink)}
    .login-card{background:var(--paper);border-radius:0;padding:56px 44px;text-align:center;box-shadow:none;max-width:380px;width:100%;border-top:3px solid var(--vermillion)}
    .login-card h2{font-size:23px;margin-bottom:10px;letter-spacing:.05em}
    .login-card p{color:var(--ink-soft);font-size:13px;margin-bottom:36px;line-height:1.8}
    .btn-google{background:var(--paper);color:var(--ink);border:1px solid var(--ink);display:flex;align-items:center;gap:10px;font-size:14px;padding:13px 24px;border-radius:0;cursor:pointer;width:100%;justify-content:center;font-weight:500;transition:all .15s;font-family:inherit}
    .btn-google:hover{background:var(--ink);color:var(--paper)}
    .btn-google:hover svg{filter:grayscale(1) brightness(2)}
    .login-note{margin-top:22px;font-size:11px;color:#a89f87;letter-spacing:.02em}
    /* エラー画面 */
    #errorScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--ink)}
    .error-card{background:var(--paper);border-radius:0;padding:56px 44px;text-align:center;box-shadow:none;max-width:380px;width:100%;border-top:3px solid var(--vermillion)}
    .error-card h2{font-size:21px;margin-bottom:14px;color:var(--vermillion)}
    .error-card p{font-size:13px;color:var(--ink-soft);margin-bottom:28px;line-height:1.8}
    .btn-secondary{background:transparent;color:var(--ink);border:1px solid var(--ink);padding:9px 22px;border-radius:0;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
    #mainContent{display:none}
    .loading{text-align:center;padding:60px;color:#8c8470;font-size:13px;font-family:'Shippori Mincho',serif}
    .empty{text-align:center;padding:60px;color:#a89f87}
    .empty p{font-size:14px;font-family:'Shippori Mincho',serif}
    footer{text-align:center;padding:28px;font-size:11px;color:#a89f87;border-top:1px solid var(--line);letter-spacing:.05em}
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-card">
    <h2>灘校生徒会</h2>
    <p>灘校のGoogleアカウントでログインしてください</p>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
    <p class="login-note">@stg.nada.ac.jp のアカウントのみ利用可能</p>
  </div>
</div>

<!-- エラー画面 -->
<div id="errorScreen">
  <div class="error-card">
    <h2>アクセスできません</h2>
    <p id="errorMsg"></p>
    <button class="btn-secondary" onclick="logout()">別のアカウントでログイン</button>
  </div>
</div>

<!-- メインコンテンツ -->
<div id="mainContent">
  <header>
    <h1>灘校生徒会</h1>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <a id="adminLink" href="admin.html" class="btn-admin" style="display:none">管理画面</a>
      <button class="btn btn-outline" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="hero">
    <div class="hero-inner">
      <h2>お知らせ</h2>
      <p>生徒会からの最新情報をお届けします</p>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterPosts('')" data-cat="">すべて</button>
    <button class="filter-btn" onclick="filterPosts('お知らせ')" data-cat="お知らせ">お知らせ</button>
    <button class="filter-btn" onclick="filterPosts('行事')" data-cat="行事">行事</button>
    <button class="filter-btn" onclick="filterPosts('部活')" data-cat="部活">部活</button>
    <button class="filter-btn" onclick="filterPosts('募集')" data-cat="募集">募集</button>
    <button class="filter-btn" onclick="filterPosts('その他')" data-cat="その他">その他</button>
  </div>

  <div class="posts-grid" id="postsGrid">
    <div class="loading">読み込み中...</div>
  </div>

  <footer>© 灘校生徒会</footer>
</div>

<script>
  const SUPABASE_URL = 'https://uvqidlzkiuyvqxqttuae.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWlkbHpraXV5dnF4cXR0dWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzk0MTEsImV4cCI6MjA5ODA1NTQxMX0.VrpNjeEpsfOGJKsSz8uSGxrqiuChT9QjEzgjUnAv1s8';
  const ADMIN_EMAIL = 'j170470@stg.nada.ac.jp';
  // ※テスト中はドメイン制限なし。本番に戻す場合は↓を 'stg.nada.ac.jp' に変更
  const ALLOWED_DOMAIN = null;

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, storageKey: 'seitokai-session' }
  });

  let allPosts = [];
  let currentMember = null;

  db.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      // 大文字小文字・前後の空白の違いで誤って弾かれないように正規化して比較
      const email = (session.user.email || '').trim();
      const emailLower = email.toLowerCase();

      // ドメイン制限（ALLOWED_DOMAINがnullなら全員許可）
      if (ALLOWED_DOMAIN && emailLower.split('@')[1] !== ALLOWED_DOMAIN.toLowerCase()) {
        await db.auth.signOut();
        showError(`@${ALLOWED_DOMAIN} のアカウントでログインしてください。<br>（現在：${email}）`);
        return;
      }

      // 認証が確認できた時点で即座にメイン画面を表示する
      // （membersテーブルの登録・取得を待って画面遷移すると、その処理が
      //   失敗・遅延した場合にログイン画面のまま止まって見えてしまうため）
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('userName').textContent = email;
      if (emailLower === ADMIN_EMAIL.toLowerCase()) document.getElementById('adminLink').style.display = 'inline-block';
      loadPosts();

      syncMember(session.user.id, email);
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'none';
    }
  });

  // membersテーブルへの登録・ロール取得はバックグラウンドで行う
  // （失敗してもログイン自体やお知らせ表示はブロックしない）
  async function syncMember(userId, email) {
    try {
      const { error: upsertError } = await db.from('members')
        .upsert({ id: userId, email, role: 'general' }, { onConflict: 'id', ignoreDuplicates: true });
      if (upsertError) console.error('members登録エラー:', upsertError.message);

      const { data: member, error: memberError } = await db.from('members').select('*').eq('id', userId).single();
      if (memberError) console.error('members取得エラー:', memberError.message);

      if (member && member.role !== currentMember?.role) {
        currentMember = member;
        loadPosts(); // ロールが判明したら対象お知らせを再読込
      } else {
        currentMember = member;
      }
    } catch (e) {
      console.error('members同期エラー:', e);
    }
  }

  function showError(msg) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('errorScreen').style.display = 'flex';
    document.getElementById('errorMsg').innerHTML = msg;
  }

  async function loginWithGoogle() {
    const opts = { redirectTo: location.href };
    if (ALLOWED_DOMAIN) opts.queryParams = { hd: ALLOWED_DOMAIN };
    await db.auth.signInWithOAuth({ provider: 'google', options: opts });
  }

  async function logout() {
    await db.auth.signOut();
    document.getElementById('errorScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  async function loadPosts() {
    const { data, error } = await db.from('posts').select('*').eq('published', true).order('created_at', { ascending: false });
    if (error) { document.getElementById('postsGrid').innerHTML = '<div class="empty"><p>読み込みに失敗しました</p></div>'; return; }

    const myRole = currentMember?.role || 'general';
    // target_rolesが空配列 or 自分のロールを含む投稿のみ表示
    allPosts = (data || []).filter(p => !p.target_roles || p.target_roles.length === 0 || p.target_roles.includes(myRole) || p.target_roles.includes('全体'));
    renderPosts(allPosts);
  }

  function filterPosts(cat) {
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.cat === cat));
    renderPosts(cat ? allPosts.filter(p => p.category === cat) : allPosts);
  }

  function renderPosts(posts) {
    const grid = document.getElementById('postsGrid');
    if (posts.length === 0) { grid.innerHTML = '<div class="empty"><p>まだお知らせはありません</p></div>'; return; }
    grid.innerHTML = posts.map(post => {
      const date = new Date(post.created_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      const rolesHtml = (post.target_roles && post.target_roles.length > 0)
        ? post.target_roles.map(r => `<span class="role-tag">${escapeHtml(r)}</span>`).join('') : '';
      const filesNote = (post.file_paths && post.file_paths.length > 0) ? `<div class="post-has-files">添付 ${post.file_paths.length}件</div>` : '';
      return `<a class="post-card" href="post.html?id=${post.id}">
        <div class="post-meta">
          <span class="category-tag ${post.category}">${post.category}</span>
          <span class="post-date">${date}</span>
          ${rolesHtml}
        </div>
        <div class="post-title">${escapeHtml(post.title)}</div>
        <div class="post-excerpt">${escapeHtml(post.body)}</div>
        ${filesNote}
      </a>`;
    }).join('');
  }

  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
