<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灘校生徒会 お知らせ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f7f8fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header a {
      color: #a0c4ff;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      padding: 64px 24px 48px;
      text-align: center;
    }

    .hero h2 {
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 15px;
      color: #a0c4ff;
      opacity: 0.9;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 20px 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #d0d5dd;
      background: #fff;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }

    .posts-grid {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 64px;
      display: grid;
      gap: 16px;
    }

    .post-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .post-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .category-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      background: #e8f0fe;
      color: #1a73e8;
      letter-spacing: 0.05em;
    }

    .category-tag.行事 { background: #fce8e8; color: #d32f2f; }
    .category-tag.部活 { background: #e8f5e9; color: #2e7d32; }
    .category-tag.募集 { background: #fff3e0; color: #e65100; }
    .category-tag.その他 { background: #f3e5f5; color: #6a1b9a; }

    .post-date { font-size: 12px; color: #888; }

    .post-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .post-excerpt {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-has-files {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }

    .loading { text-align: center; padding: 60px; color: #888; font-size: 14px; }
    .empty { text-align: center; padding: 60px; color: #aaa; }
    .empty p { font-size: 15px; }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #aaa;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

<header>
  <h1>灘校生徒会</h1>
  <a href="admin.html">管理者ログイン</a>
</header>

<div class="hero">
  <h2>お知らせ</h2>
  <p>生徒会からの最新情報をお届けします</p>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterPosts('')" data-cat="">すべて</button>
  <button class="filter-btn" onclick="filterPosts('お知らせ')" data-cat="お知らせ">お知らせ</button>
  <button class="filter-btn" onclick="filterPosts('行事')" data-cat="行事">行事</button>
  <button class="filter-btn" onclick="filterPosts('部活')" data-cat="部活">部活</button>
  <button class="filter-btn" onclick="filterPosts('募集')" data-cat="募集">募集</button>
  <button class="filter-btn" onclick="filterPosts('その他')" data-cat="その他">その他</button>
</div>

<div class="posts-grid" id="postsGrid">
  <div class="loading">読み込み中...</div>
</div>

<footer>© 灘校生徒会</footer>

<script>
  const SUPABASE_URL = 'https://uvqidlzkiuyvqxqttuae.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWlkbHpraXV5dnF4cXR0dWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzk0MTEsImV4cCI6MjA5ODA1NTQxMX0.VrpNjeEpsfOGJKsSz8uSGxrqiuChT9QjEzgjUnAv1s8';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allPosts = [];

  async function loadPosts() {
    const { data, error } = await db
      .from('posts')
      .select('*')
      .eq('published', true)
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('postsGrid').innerHTML = '<div class="empty"><p>読み込みに失敗しました</p></div>';
      return;
    }

    allPosts = data || [];
    renderPosts(allPosts);
  }

  function filterPosts(cat) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.cat === cat);
    });
    const filtered = cat ? allPosts.filter(p => p.category === cat) : allPosts;
    renderPosts(filtered);
  }

  function renderPosts(posts) {
    const grid = document.getElementById('postsGrid');
    if (posts.length === 0) {
      grid.innerHTML = '<div class="empty"><p>まだお知らせはありません</p></div>';
      return;
    }

    grid.innerHTML = posts.map(post => {
      const date = new Date(post.created_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      const filesNote = (post.file_paths && post.file_paths.length > 0)
        ? `<div class="post-has-files">添付ファイル ${post.file_paths.length}件</div>` : '';
      return `
        <a class="post-card" href="post.html?id=${post.id}">
          <div class="post-meta">
            <span class="category-tag ${post.category}">${post.category}</span>
            <span class="post-date">${date}</span>
          </div>
          <div class="post-title">${escapeHtml(post.title)}</div>
          <div class="post-excerpt">${escapeHtml(post.body)}</div>
          ${filesNote}
        </a>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadPosts();
</script>
</body>
</html>
