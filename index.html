<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灘校生徒会 お知らせ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f7f8fa;color:#1a1a2e;min-height:100vh}
    header{background:#1a1a2e;color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
    header h1{font-size:18px;font-weight:700;letter-spacing:.05em}
    .header-right{display:flex;align-items:center;gap:16px}
    .user-name{font-size:13px;color:#a0c4ff}
    .btn{padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
    .btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4)}
    .btn-outline:hover{background:rgba(255,255,255,.1)}
    .btn-admin{background:#a0c4ff;color:#1a1a2e;border:none;font-size:13px;padding:6px 14px;border-radius:6px;font-weight:700}
    .btn-admin:hover{background:#fff}
    .hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);color:#fff;padding:64px 24px 48px;text-align:center}
    .hero h2{font-size:clamp(24px,5vw,40px);font-weight:800;letter-spacing:.04em;margin-bottom:12px}
    .hero p{font-size:15px;color:#a0c4ff;opacity:.9}
    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:20px 24px;max-width:900px;margin:0 auto}
    .filter-btn{padding:6px 16px;border-radius:20px;border:1.5px solid #d0d5dd;background:#fff;color:#555;font-size:13px;cursor:pointer;transition:all .2s}
    .filter-btn.active,.filter-btn:hover{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
    .posts-grid{max-width:900px;margin:0 auto;padding:0 24px 64px;display:grid;gap:16px}
    .post-card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:box-shadow .2s,transform .2s;text-decoration:none;color:inherit;display:block}
    .post-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px)}
    .post-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .category-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#e8f0fe;color:#1a73e8;letter-spacing:.05em}
    .category-tag.行事{background:#fce8e8;color:#d32f2f}
    .category-tag.部活{background:#e8f5e9;color:#2e7d32}
    .category-tag.募集{background:#fff3e0;color:#e65100}
    .category-tag.その他{background:#f3e5f5;color:#6a1b9a}
    .role-tag{font-size:11px;padding:3px 8px;border-radius:20px;background:#fef9e7;color:#b7791f;border:1px solid #fde68a}
    .post-date{font-size:12px;color:#888}
    .post-title{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:8px}
    .post-excerpt{font-size:14px;color:#555;line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .post-has-files{font-size:12px;color:#888;margin-top:8px}
    /* ログイン画面 */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .login-card{background:#fff;border-radius:20px;padding:48px 40px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:400px;width:100%}
    .login-card h2{font-size:24px;margin-bottom:8px}
    .login-card p{color:#666;font-size:14px;margin-bottom:32px;line-height:1.7}
    .btn-google{background:#fff;color:#444;border:1.5px solid #ddd;display:flex;align-items:center;gap:10px;font-size:15px;padding:12px 24px;border-radius:8px;cursor:pointer;width:100%;justify-content:center;font-weight:600;transition:all .2s}
    .btn-google:hover{background:#f5f5f5;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .login-note{margin-top:20px;font-size:12px;color:#999}
    /* エラー画面 */
    #errorScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .error-card{background:#fff;border-radius:20px;padding:48px 40px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:400px;width:100%}
    .error-card h2{font-size:22px;margin-bottom:12px;color:#d32f2f}
    .error-card p{font-size:14px;color:#555;margin-bottom:24px;line-height:1.7}
    .btn-secondary{background:#f0f4ff;color:#1a1a2e;border:none;padding:8px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
    #mainContent{display:none}
    .loading{text-align:center;padding:60px;color:#888;font-size:14px}
    .empty{text-align:center;padding:60px;color:#aaa}
    .empty p{font-size:15px}
    footer{text-align:center;padding:24px;font-size:12px;color:#aaa;border-top:1px solid #eee}
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-card">
    <h2>灘校生徒会</h2>
    <p>灘校のGoogleアカウントでログインしてください</p>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
    <p class="login-note">@stg.nada.ac.jp のアカウントのみ利用可能</p>
  </div>
</div>

<!-- エラー画面 -->
<div id="errorScreen">
  <div class="error-card">
    <h2>アクセスできません</h2>
    <p id="errorMsg"></p>
    <button class="btn-secondary" onclick="logout()">別のアカウントでログイン</button>
  </div>
</div>

<!-- メインコンテンツ -->
<div id="mainContent">
  <header>
    <h1>灘校生徒会</h1>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <a id="adminLink" href="admin.html" class="btn-admin" style="display:none">管理画面</a>
      <button class="btn btn-outline" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="hero">
    <h2>お知らせ</h2>
    <p>生徒会からの最新情報をお届けします</p>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterPosts('')" data-cat="">すべて</button>
    <button class="filter-btn" onclick="filterPosts('お知らせ')" data-cat="お知らせ">お知らせ</button>
    <button class="filter-btn" onclick="filterPosts('行事')" data-cat="行事">行事</button>
    <button class="filter-btn" onclick="filterPosts('部活')" data-cat="部活">部活</button>
    <button class="filter-btn" onclick="filterPosts('募集')" data-cat="募集">募集</button>
    <button class="filter-btn" onclick="filterPosts('その他')" data-cat="その他">その他</button>
  </div>

  <div class="posts-grid" id="postsGrid">
    <div class="loading">読み込み中...</div>
  </div>

  <footer>© 灘校生徒会</footer>
</div>

<script>
  const SUPABASE_URL = 'https://uvqidlzkiuyvqxqttuae.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWlkbHpraXV5dnF4cXR0dWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzk0MTEsImV4cCI6MjA5ODA1NTQxMX0.VrpNjeEpsfOGJKsSz8uSGxrqiuChT9QjEzgjUnAv1s8';
  const ADMIN_EMAIL = 'j170470@stg.nada.ac.jp';
  const ALLOWED_DOMAIN = 'stg.nada.ac.jp';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allPosts = [];
  let currentMember = null;

  db.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      const email = session.user.email;
      if (email.split('@')[1] !== ALLOWED_DOMAIN) {
        await db.auth.signOut();
        showError(`@${ALLOWED_DOMAIN} のアカウントでログインしてください。<br>（現在：${email}）`);
        return;
      }
      // membersテーブルにupsert
      await db.from('members').upsert({ id: session.user.id, email }, { onConflict: 'id', ignoreDuplicates: true });
      const { data: member } = await db.from('members').select('*').eq('id', session.user.id).single();
      currentMember = member;

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('userName').textContent = email;
      if (email === ADMIN_EMAIL) document.getElementById('adminLink').style.display = 'inline-block';
      loadPosts();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'none';
    }
  });

  function showError(msg) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('errorScreen').style.display = 'flex';
    document.getElementById('errorMsg').innerHTML = msg;
  }

  async function loginWithGoogle() {
    await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.href, queryParams: { hd: ALLOWED_DOMAIN } } });
  }

  async function logout() {
    await db.auth.signOut();
    document.getElementById('errorScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  async function loadPosts() {
    const { data, error } = await db.from('posts').select('*').eq('published', true).order('created_at', { ascending: false });
    if (error) { document.getElementById('postsGrid').innerHTML = '<div class="empty"><p>読み込みに失敗しました</p></div>'; return; }

    const myRole = currentMember?.role || 'general';
    // target_rolesが空配列 or 自分のロールを含む投稿のみ表示
    allPosts = (data || []).filter(p => !p.target_roles || p.target_roles.length === 0 || p.target_roles.includes(myRole) || p.target_roles.includes('全体'));
    renderPosts(allPosts);
  }

  function filterPosts(cat) {
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.cat === cat));
    renderPosts(cat ? allPosts.filter(p => p.category === cat) : allPosts);
  }

  function renderPosts(posts) {
    const grid = document.getElementById('postsGrid');
    if (posts.length === 0) { grid.innerHTML = '<div class="empty"><p>まだお知らせはありません</p></div>'; return; }
    grid.innerHTML = posts.map(post => {
      const date = new Date(post.created_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      const rolesHtml = (post.target_roles && post.target_roles.length > 0)
        ? post.target_roles.map(r => `<span class="role-tag">${escapeHtml(r)}</span>`).join('') : '';
      const filesNote = (post.file_paths && post.file_paths.length > 0) ? `<div class="post-has-files">添付 ${post.file_paths.length}件</div>` : '';
      return `<a class="post-card" href="post.html?id=${post.id}">
        <div class="post-meta">
          <span class="category-tag ${post.category}">${post.category}</span>
          <span class="post-date">${date}</span>
          ${rolesHtml}
        </div>
        <div class="post-title">${escapeHtml(post.title)}</div>
        <div class="post-excerpt">${escapeHtml(post.body)}</div>
        ${filesNote}
      </a>`;
    }).join('');
  }

  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
