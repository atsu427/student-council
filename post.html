<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ詳細 | 灘校生徒会</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#1f2420;
      --ink-soft:#4b5048;
      --paper:#f5f2ea;
      --paper-deep:#ece6d8;
      --line:#cdc4ab;
      --vermillion:#a23b2e;
      --gold:#9c7a32;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
    h2,.login-card h2{font-family:'Shippori Mincho',serif}
    header{background:var(--ink);color:var(--paper);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;border-bottom:3px solid var(--vermillion)}
    header h1{font-size:19px;font-weight:700;font-family:'Shippori Mincho',serif;letter-spacing:.06em}
    .header-right{display:flex;align-items:center;gap:18px}
    .user-name{font-size:12px;color:#cfc6ad}
    .btn-outline{background:transparent;color:var(--paper);border:1px solid rgba(245,242,234,.45);padding:7px 18px;border-radius:0;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
    .btn-outline:hover{background:rgba(245,242,234,.1)}
    .container{max-width:680px;margin:0 auto;padding:48px 32px 96px}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--ink-soft);text-decoration:none;font-size:13px;margin-bottom:32px;border-bottom:1px solid transparent;padding-bottom:2px}
    .back-link:hover{color:var(--vermillion);border-bottom-color:var(--vermillion)}
    .post-card{background:transparent;border:none;border-top:1px solid var(--ink);padding:32px 0 0;box-shadow:none}
    .post-meta{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
    .category-tag{font-size:12px;font-weight:700;padding:2px 0;border-radius:0;background:none;color:var(--vermillion);letter-spacing:.08em;border-bottom:1px solid currentColor}
    .category-tag.行事{color:#6b5a1f}
    .category-tag.部活{color:#3d6b4a}
    .category-tag.募集{color:#a25f1f}
    .category-tag.その他{color:#5a4a6b}
    .post-date{font-size:13px;color:#8c8470;font-family:'Shippori Mincho',serif}
    h2{font-size:clamp(22px,4vw,30px);font-weight:700;line-height:1.5;margin-bottom:14px;letter-spacing:.02em}
    .post-author{font-size:13px;color:#8c8470;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--line)}
    .post-body{font-size:16px;line-height:2;color:var(--ink);white-space:pre-wrap;word-break:break-word;margin-bottom:36px}
    /* 添付ファイル */
    .attachments{border-top:1px solid var(--line);padding-top:30px}
    .attachments h3{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:18px;letter-spacing:.05em}
    /* 画像グリッド */
    .image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:2px;margin-bottom:18px}
    .image-grid img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:0;cursor:pointer;border:1px solid var(--paper);transition:opacity .2s}
    .image-grid img:hover{opacity:.8}
    /* ファイルリスト */
    .file-list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--line)}
    .file-item{display:flex;align-items:center;gap:14px;padding:14px 4px;background:transparent;border-radius:0;border:none;border-bottom:1px solid var(--line);text-decoration:none;color:var(--ink);transition:padding-left .15s}
    .file-item:hover{padding-left:10px;color:var(--vermillion)}
    .file-icon{font-size:18px;flex-shrink:0}
    .file-info{flex:1;min-width:0}
    .file-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-action{font-size:12px;color:var(--gold);flex-shrink:0;font-weight:600}
    /* ライトボックス */
    #lightbox{display:none;position:fixed;inset:0;background:rgba(20,18,14,.94);z-index:999;align-items:center;justify-content:center;padding:20px}
    #lightbox.open{display:flex}
    #lightbox img{max-width:100%;max-height:90vh;border-radius:0;object-fit:contain}
    .lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:36px;cursor:pointer;line-height:1;user-select:none}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:30px;cursor:pointer;user-select:none;padding:12px;background:transparent;border-radius:0;border:1px solid rgba(255,255,255,.3)}
    #lbPrev{left:16px}
    #lbNext{right:16px}
    /* ログイン画面 */
    #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--ink)}
    .login-card{background:var(--paper);border-radius:0;padding:56px 44px;text-align:center;box-shadow:none;max-width:380px;width:100%;border-top:3px solid var(--vermillion)}
    .login-card h2{font-size:23px;margin-bottom:10px;letter-spacing:.05em}
    .login-card p{color:var(--ink-soft);font-size:13px;margin-bottom:36px;line-height:1.8}
    .btn-google{background:var(--paper);color:var(--ink);border:1px solid var(--ink);display:flex;align-items:center;gap:10px;font-size:14px;padding:13px 24px;border-radius:0;cursor:pointer;width:100%;justify-content:center;font-weight:500;transition:all .15s;font-family:inherit}
    .btn-google:hover{background:var(--ink);color:var(--paper)}
    #mainContent{display:none}
    .loading{text-align:center;padding:80px;color:#a89f87;font-family:'Shippori Mincho',serif}
    .error-msg{text-align:center;padding:80px;color:var(--vermillion);font-family:'Shippori Mincho',serif}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h2>灘校生徒会</h2>
    <p>続けるにはログインが必要です</p>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
  </div>
</div>

<div id="mainContent">
  <header>
    <h1><a href="index.html" style="color:#f5f2ea;text-decoration:none">灘校生徒会</a></h1>
    <div class="header-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-outline" onclick="logout()">ログアウト</button>
    </div>
  </header>
  <div class="container">
    <a class="back-link" href="index.html">← お知らせ一覧に戻る</a>
    <div id="content"><div class="loading">読み込み中...</div></div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <span class="lb-close">&times;</span>
  <span class="lb-nav" id="lbPrev" onclick="event.stopPropagation();lbMove(-1)">&#8249;</span>
  <img id="lbImg" src="" alt="">
  <span class="lb-nav" id="lbNext" onclick="event.stopPropagation();lbMove(1)">&#8250;</span>
</div>

<script>
  const SUPABASE_URL = 'https://uvqidlzkiuyvqxqttuae.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWlkbHpraXV5dnF4cXR0dWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzk0MTEsImV4cCI6MjA5ODA1NTQxMX0.VrpNjeEpsfOGJKsSz8uSGxrqiuChT9QjEzgjUnAv1s8';
  // ※テスト中はドメイン制限なし。本番に戻す場合は null → 'stg.nada.ac.jp' に変更
  const ALLOWED_DOMAIN = null;
  const STORAGE_BUCKET = 'post-files';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, storageKey: 'seitokai-session' }
  });

  let lbImages = [];
  let lbIndex = 0;

  function isImage(name) { return /\.(jpg|jpeg|png|gif|webp)$/i.test(name); }
  function isPdf(name) { return /\.pdf$/i.test(name); }

  function getFileIcon(name) {
    if (isImage(name)) return '🖼️';
    if (isPdf(name)) return '📄';
    if (/\.(doc|docx)$/i.test(name)) return '📝';
    if (/\.(xls|xlsx)$/i.test(name)) return '📊';
    if (/\.(ppt|pptx)$/i.test(name)) return '📑';
    if (/\.(zip|rar|7z)$/i.test(name)) return '🗜️';
    if (/\.(mp4|mov|avi)$/i.test(name)) return '🎬';
    if (/\.(mp3|wav|m4a)$/i.test(name)) return '🎵';
    return '📎';
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      const email = (session.user.email || '').trim();
      const emailLower = email.toLowerCase();
      if (ALLOWED_DOMAIN && emailLower.split('@')[1] !== ALLOWED_DOMAIN.toLowerCase()) { await db.auth.signOut(); return; }
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('userName').textContent = email;
      loadPost(session.user);
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'none';
    }
  });

  async function loginWithGoogle() {
    const opts = { redirectTo: location.href };
    if (ALLOWED_DOMAIN) opts.queryParams = { hd: ALLOWED_DOMAIN };
    await db.auth.signInWithOAuth({ provider: 'google', options: opts });
  }

  async function logout() {
    await db.auth.signOut();
  }

  async function loadPost(user) {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { showError('記事が見つかりません'); return; }

    const { data, error } = await db.from('posts').select('*').eq('id', id).eq('published', true).single();
    if (error || !data) { showError('記事が見つかりません'); return; }

    // ロール制限チェック（members取得に失敗してもgeneral扱いで処理を継続する）
    if (data.target_roles && data.target_roles.length > 0) {
      let myRole = 'general';
      try {
        const { data: member, error: memberError } = await db.from('members').select('role').eq('id', user.id).single();
        if (memberError) console.error('members取得エラー:', memberError.message);
        myRole = member?.role || 'general';
      } catch (e) {
        console.error('members取得エラー:', e);
      }
      if (!data.target_roles.includes(myRole) && !data.target_roles.includes('全体')) {
        showError('この記事を閲覧する権限がありません');
        return;
      }
    }

    document.title = data.title + ' | 灘校生徒会';
    const date = new Date(data.created_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

    // ファイル分類
    let filesHtml = '';
    if (data.file_paths && data.file_paths.length > 0) {
      const imagePaths = data.file_paths.filter(p => isImage(p.split('/').pop()));
      const otherPaths = data.file_paths.filter(p => !isImage(p.split('/').pop()));

      lbImages = imagePaths.map(path => {
        const { data: u } = db.storage.from(STORAGE_BUCKET).getPublicUrl(path);
        return u.publicUrl;
      });

      // 画像グリッド
      let imgHtml = '';
      if (imagePaths.length > 0) {
        imgHtml = `<div class="image-grid">` +
          imagePaths.map((path, i) => {
            const { data: u } = db.storage.from(STORAGE_BUCKET).getPublicUrl(path);
            const name = path.split('/').pop();
            return `<img src="${u.publicUrl}" alt="${escapeHtml(name)}" onclick="openLightbox(${i})" loading="lazy">`;
          }).join('') +
          `</div>`;
      }

      // その他ファイルリスト
      let otherHtml = '';
      if (otherPaths.length > 0) {
        otherHtml = `<div class="file-list">` +
          otherPaths.map(path => {
            const { data: u } = db.storage.from(STORAGE_BUCKET).getPublicUrl(path);
            const name = path.split('/').pop();
            const action = isPdf(name) ? 'ダウンロード' : 'ダウンロード';
            return `<a class="file-item" href="${u.publicUrl}" target="_blank" download="${escapeHtml(name)}">
              <span class="file-icon">${getFileIcon(name)}</span>
              <div class="file-info"><div class="file-name">${escapeHtml(name)}</div></div>
              <span class="file-action">${action} ↓</span>
            </a>`;
          }).join('') +
          `</div>`;
      }

      filesHtml = `<div class="attachments">
        <h3>添付ファイル（${data.file_paths.length}件）</h3>
        ${imgHtml}${otherHtml}
      </div>`;
    }

    document.getElementById('content').innerHTML = `
      <div class="post-card">
        <div class="post-meta">
          <span class="category-tag ${data.category}">${data.category}</span>
          <span class="post-date">${date}</span>
        </div>
        <h2>${escapeHtml(data.title)}</h2>
        <div class="post-author">投稿者：${escapeHtml(data.author)}</div>
        <div class="post-body">${escapeHtml(data.body)}</div>
        ${filesHtml}
      </div>`;
  }

  function openLightbox(i) {
    lbIndex = i;
    document.getElementById('lbImg').src = lbImages[i];
    document.getElementById('lightbox').classList.add('open');
    document.getElementById('lbPrev').style.display = lbImages.length > 1 ? 'flex' : 'none';
    document.getElementById('lbNext').style.display = lbImages.length > 1 ? 'flex' : 'none';
  }

  function lbMove(dir) {
    lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
    document.getElementById('lbImg').src = lbImages[lbIndex];
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  function showError(msg) {
    document.getElementById('content').innerHTML = `<div class="error-msg">${msg}</div>`;
  }

  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
