<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ詳細 | 灘校生徒会</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f7f8fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 60px;
      gap: 16px;
    }

    header h1 { font-size: 18px; font-weight: 700; }

    .container {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 24px 80px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .back-link:hover { color: #1a1a2e; }

    .post-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .category-tag {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      background: #e8f0fe;
      color: #1a73e8;
    }

    .category-tag.行事 { background: #fce8e8; color: #d32f2f; }
    .category-tag.部活 { background: #e8f5e9; color: #2e7d32; }
    .category-tag.募集 { background: #fff3e0; color: #e65100; }
    .category-tag.その他 { background: #f3e5f5; color: #6a1b9a; }

    .post-date { font-size: 13px; color: #888; }

    h2 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .post-author {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #eee;
    }

    .post-body {
      font-size: 16px;
      line-height: 1.9;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 32px;
    }

    /* ファイル添付セクション */
    .attachments {
      border-top: 1px solid #eee;
      padding-top: 24px;
      margin-top: 8px;
    }

    .attachments h3 {
      font-size: 14px;
      font-weight: 700;
      color: #444;
      margin-bottom: 12px;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f7f8fa;
      border-radius: 8px;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 14px;
      border: 1px solid #e5e7eb;
      transition: background 0.2s;
    }

    .file-item:hover { background: #e8f0fe; }

    .file-icon { font-size: 18px; flex-shrink: 0; }

    .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-size { font-size: 12px; color: #888; flex-shrink: 0; }

    .image-preview {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .image-preview img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      border: 1px solid #e5e7eb;
    }

    .image-preview img:hover { opacity: 0.85; }

    /* ライトボックス */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
    }

    .loading { text-align: center; padding: 80px; color: #aaa; }
    .error { text-align: center; padding: 80px; color: #d32f2f; }
  </style>
</head>
<body>

<header>
  <h1><a href="index.html" style="color:#fff;text-decoration:none;">灘校生徒会</a></h1>
</header>

<div class="container">
  <a class="back-link" href="index.html">← お知らせ一覧に戻る</a>
  <div id="content"><div class="loading">読み込み中...</div></div>
</div>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const SUPABASE_URL = 'https://uvqidlzkiuyvqxqttuae.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWlkbHpraXV5dnF4cXR0dWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzk0MTEsImV4cCI6MjA5ODA1NTQxMX0.VrpNjeEpsfOGJKsSz8uSGxrqiuChT9QjEzgjUnAv1s8';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';
    if (['pdf'].includes(ext)) return '📄';
    if (['doc','docx'].includes(ext)) return '📝';
    if (['xls','xlsx'].includes(ext)) return '📊';
    if (['ppt','pptx'].includes(ext)) return '📑';
    if (['zip','rar','7z'].includes(ext)) return '🗜️';
    if (['mp4','mov','avi'].includes(ext)) return '🎬';
    if (['mp3','wav','m4a'].includes(ext)) return '🎵';
    return '📎';
  }

  function isImage(name) {
    const ext = name.split('.').pop().toLowerCase();
    return ['jpg','jpeg','png','gif','webp'].includes(ext);
  }

  async function loadPost() {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (!id) { showError('記事が見つかりません'); return; }

    const { data, error } = await db
      .from('posts')
      .select('*')
      .eq('id', id)
      .eq('published', true)
      .single();

    if (error || !data) { showError('記事が見つかりません'); return; }

    document.title = data.title + ' | 灘校生徒会';

    const date = new Date(data.created_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

    // ファイル表示の構築
    let filesHtml = '';
    if (data.file_paths && data.file_paths.length > 0) {
      const imageFiles = data.file_paths.filter(p => isImage(p.split('/').pop()));
      const otherFiles = data.file_paths.filter(p => !isImage(p.split('/').pop()));

      let imageHtml = '';
      if (imageFiles.length > 0) {
        const imgTags = imageFiles.map(path => {
          const { data: urlData } = db.storage.from('post-files').getPublicUrl(path);
          const url = urlData.publicUrl;
          const name = path.split('/').pop();
          return `<img src="${url}" alt="${escapeHtml(name)}" onclick="openLightbox('${url}')" loading="lazy">`;
        }).join('');
        imageHtml = `<div class="image-preview">${imgTags}</div>`;
      }

      let otherHtml = '';
      if (otherFiles.length > 0) {
        const items = otherFiles.map(path => {
          const { data: urlData } = db.storage.from('post-files').getPublicUrl(path);
          const url = urlData.publicUrl;
          const name = path.split('/').pop();
          return `
            <a class="file-item" href="${url}" target="_blank" download>
              <span class="file-icon">${getFileIcon(name)}</span>
              <span class="file-name">${escapeHtml(name)}</span>
            </a>
          `;
        }).join('');
        otherHtml = `<div class="file-list">${items}</div>`;
      }

      filesHtml = `
        <div class="attachments">
          <h3>添付ファイル（${data.file_paths.length}件）</h3>
          ${imageHtml}
          ${otherHtml}
        </div>
      `;
    }

    document.getElementById('content').innerHTML = `
      <div class="post-card">
        <div class="post-meta">
          <span class="category-tag ${data.category}">${data.category}</span>
          <span class="post-date">${date}</span>
        </div>
        <h2>${escapeHtml(data.title)}</h2>
        <div class="post-author">投稿者：${escapeHtml(data.author)}</div>
        <div class="post-body">${escapeHtml(data.body)}</div>
        ${filesHtml}
      </div>
    `;
  }

  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightboxImg').src = '';
  }

  function showError(msg) {
    document.getElementById('content').innerHTML = `<div class="error">${msg}</div>`;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadPost();
</script>
</body>
</html>
